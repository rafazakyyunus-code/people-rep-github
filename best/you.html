<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blue 💙</title>

<link rel="stylesheet" href="you.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="bg-lines"></div>

<div class="container">

    <!-- LEFT -->
    <div class="left">

        <div class="photo-card">
            <img
            src="syakila.png"
            alt="Photo">
        </div>

        <div class="tag">
            🤍  I Think You Are The Sweetest Thing
        </div>

    </div>

    <!-- RIGHT -->
    <div class="right">

        <div class="music-card">

            <div class="music-header">

                <video class="song-video" autoplay muted loop playsinline>
                    <source src="moon.mp3.mp4" type="video/mp4">
                </video>

                <div class="vinyl" id="vinyl">
                    <img
                    src="p.jpg"
                    alt="Blue">
                </div>

                <div class="song-info">
                    <h2 id="songTitle">Blue</h2>
                    <span id="songArtist">Yung Kai</span>
                </div>

            </div>

            <h1>
                You Are The Best Thing That Ever Happened To Me
            </h1>

            <p class="desc">
                Makasih udah selalu dengerin cerita random aku, nemenin pas lagi capek, dan bikin hari-hari aku jadi lebih ringan. Makasih yah kila cantik🤍.
            </p>

            <div class="controls">

                <button id="prevBtn">
                    <i class="fa-solid fa-backward"></i>
                </button>

                <button id="playBtn">
                    <i class="fa-solid fa-play"></i>
                </button>

                <button id="nextBtn">
                    <i class="fa-solid fa-forward"></i>
                </button>

                <div class="time" id="currentTime">
                    00:00
                </div>

                <input
                type="range"
                id="progress"
                value="0">

                <div class="time" id="duration">
                    00:00
                </div>

            </div>

        </div>

    </div>

</div>

<audio id="audio" preload="metadata"></audio>
    <source src="blue.mp3.mp3" type="audio/mpeg">
</audio>

<script src="you.js"></script>

</body>
</html>
